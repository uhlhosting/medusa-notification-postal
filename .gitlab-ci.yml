include:
  - template: Jobs/SAST.gitlab-ci.yml
  - template: Jobs/Secret-Detection.gitlab-ci.yml

sast:
  before_script: []
  cache: []

secret_detection:
  before_script: []
  cache: []

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - when: never

stages:
  - validate
  - test
  - build
  - release
  - deploy
  - mirror

variables:
  NODE_VERSION: "22.14.0"
  PNPM_VERSION: "11.5.3"
  PNPM_STORE_DIR: "$CI_PROJECT_DIR/.pnpm-store"
  NEXT_TELEMETRY_DISABLED: "1"
  NODE_OPTIONS: "--max-old-space-size=4096"
  GIT_STRATEGY: clone
  AST_ENABLE_MR_PIPELINES: "true"

default:
  image: "node:${NODE_VERSION}-bookworm"
  cache:
    key:
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store/
  before_script:
    - npm install -g "pnpm@${PNPM_VERSION}"
    - pnpm config set store-dir "$PNPM_STORE_DIR"
    - pnpm install --frozen-lockfile --prefer-offline

validate:
  stage: validate
  script:
    - pnpm run lint
    - pnpm run typecheck

test:
  stage: test
  script:
    - pnpm run test:coverage
  coverage: '/[Aa]ll files[^|]*\|\s+([\d.]+)/'
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
    paths:
      - coverage/
    expire_in: 1 week

build:
  stage: build
  script:
    - pnpm run build
  artifacts:
    paths:
      - .medusa/
    expire_in: 1 hour

release:verify:
  stage: release
  script:
    - pnpm run release:check

# Semantic versioning and releases are fully automated with semantic-release
# (https://docs.gitlab.com/ci/examples/semantic-release/). It analyzes the
# Conventional Commits since the last tag, computes the next version, publishes
# the package to the GitLab npm registry, creates a GitLab Release with notes,
# and commits the bumped package.json + tag back to the default branch.
#
# Required project CI/CD variables (Settings > CI/CD > Variables):
#   - GITLAB_TOKEN: project/group access token, masked, scopes api +
#     write_repository, with permission to push to the protected default branch
#     and create protected `v*` tags. Used by @semantic-release/gitlab and
#     @semantic-release/git.
# The npm registry publish authenticates with the ephemeral CI_JOB_TOKEN.
release:semantic:
  stage: deploy
  needs:
    - build
    - release:verify
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  variables:
    # semantic-release needs the full history and all tags to determine the
    # last release; disable shallow clone.
    GIT_DEPTH: "0"
    NPM_TOKEN: "${CI_JOB_TOKEN}"
    # The GitLab package registry does not support npm provenance; the GitHub
    # OIDC publish handles provenance for the public npmjs registry.
    NPM_CONFIG_PROVENANCE: "false"
  before_script:
    - npm install -g "pnpm@${PNPM_VERSION}"
    - pnpm config set store-dir "$PNPM_STORE_DIR"
    - pnpm install --frozen-lockfile --prefer-offline
    - |
      {
        echo "@${CI_PROJECT_ROOT_NAMESPACE}:registry=${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/npm/"
        echo "${CI_API_V4_URL#https*:}/projects/${CI_PROJECT_ID}/packages/npm/:_authToken=\${CI_JOB_TOKEN}"
      } | tee -a .npmrc
  script:
    # Fail fast with a clear message if the release credential is missing.
    # GITLAB_TOKEN must be a masked, protected project access token with
    # api + write_repository scopes (see AGENTS.md). semantic-release reads it
    # (and GL_TOKEN) from the environment automatically.
    - |
      if [ -z "$GITLAB_TOKEN" ]; then
        echo "GITLAB_TOKEN is not set. Create a masked, protected project access token (scopes: api, write_repository) named GITLAB_TOKEN in Settings > CI/CD > Variables." >&2
        exit 1
      fi
    - export GL_TOKEN="$GITLAB_TOKEN"
    - pnpm exec semantic-release

mirror:github:
  stage: mirror
  needs:
    - job: release:semantic
      optional: true
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
      allow_failure: true
    - if: '$CI_COMMIT_TAG'
      when: manual
      allow_failure: true
  before_script: []
  script:
    # Configure this as a masked, protected GitLab CI/CD variable with write access to the GitHub mirror.
    - test -n "$GITHUB_MIRROR_TOKEN"
    - git config user.name "GitLab Mirror Bot"
    - git config user.email "mirror-bot@uhlhost.net"
    - git remote remove github 2>/dev/null || true
    - git remote add github "https://x-access-token:${GITHUB_MIRROR_TOKEN}@github.com/uhlhosting/medusa-notification-postal.git"
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        tag_target="$(git rev-parse "refs/tags/${CI_COMMIT_TAG}^{}")"
        if [ "$tag_target" != "$CI_COMMIT_SHA" ]; then
          echo "Refusing to mirror ${CI_COMMIT_TAG}: tag resolves to ${tag_target}, but pipeline verified ${CI_COMMIT_SHA}." >&2
          exit 1
        fi
        git push github "refs/tags/${CI_COMMIT_TAG}:refs/tags/${CI_COMMIT_TAG}"
      else
        git push github "HEAD:refs/heads/main"
      fi
