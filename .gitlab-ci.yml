workflow:
  rules:
    - when: always

stages:
  - validate
  - build
  - release
  - mirror

variables:
  NODE_VERSION: "22.14.0"
  PNPM_VERSION: "11.5.3"
  PNPM_STORE_DIR: "$CI_PROJECT_DIR/.pnpm-store"
  NEXT_TELEMETRY_DISABLED: "1"
  NODE_OPTIONS: "--max-old-space-size=4096"
  GIT_STRATEGY: clone

default:
  image: "node:${NODE_VERSION}-bookworm"
  cache:
    key:
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store/
  before_script:
    - npm install -g "pnpm@${PNPM_VERSION}"
    - pnpm config set store-dir "$PNPM_STORE_DIR"
    - pnpm install --frozen-lockfile --prefer-offline

validate:
  stage: validate
  script:
    - pnpm run lint
    - pnpm run typecheck

build:
  stage: build
  script:
    - pnpm run build
  artifacts:
    paths:
      - .medusa/
    expire_in: 1 hour

release:verify:
  stage: release
  script:
    - pnpm run release:check

mirror:github:
  stage: mirror
  needs:
    - release:verify
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'
  before_script: []
  script:
    - test -n "$GITHUB_MIRROR_TOKEN"
    - git config user.name "GitLab Mirror Bot"
    - git config user.email "mirror-bot@uhlhost.net"
    - git remote remove github 2>/dev/null || true
    - git remote add github "https://x-access-token:${GITHUB_MIRROR_TOKEN}@github.com/uhlhosting/medusa-notification-postal.git"
    - git fetch --tags origin
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        git push github "HEAD:refs/tags/${CI_COMMIT_TAG}"
      else
        git push github "HEAD:refs/heads/main" --tags
      fi
