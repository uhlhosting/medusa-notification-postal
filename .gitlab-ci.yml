include:
  - template: Jobs/SAST.gitlab-ci.yml
  - template: Jobs/Secret-Detection.gitlab-ci.yml

sast:
  before_script: []
  cache: []

secret_detection:
  before_script: []
  cache: []

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - when: never

stages:
  - validate
  - test
  - build
  - release
  - deploy
  - mirror

variables:
  NODE_VERSION: "22.14.0"
  PNPM_VERSION: "11.5.3"
  PNPM_STORE_DIR: "$CI_PROJECT_DIR/.pnpm-store"
  NEXT_TELEMETRY_DISABLED: "1"
  NODE_OPTIONS: "--max-old-space-size=4096"
  GIT_STRATEGY: clone
  AST_ENABLE_MR_PIPELINES: "true"

default:
  image: "node:${NODE_VERSION}-bookworm"
  cache:
    key:
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store/
  before_script:
    - npm install -g "pnpm@${PNPM_VERSION}"
    - pnpm config set store-dir "$PNPM_STORE_DIR"
    - pnpm install --frozen-lockfile --prefer-offline

validate:
  stage: validate
  script:
    - pnpm run lint
    - pnpm run typecheck

test:
  stage: test
  script:
    - pnpm run test:coverage
  coverage: '/[Aa]ll files[^|]*\|\s+([\d.]+)/'
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
    paths:
      - coverage/
    expire_in: 1 week

build:
  stage: build
  script:
    - pnpm run build
  artifacts:
    paths:
      - .medusa/
    expire_in: 1 hour

release:verify:
  stage: release
  script:
    - pnpm run release:check

publish:
  stage: deploy
  needs:
    - build
    - release:verify
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  script:
    - export NPM_REGISTRY="${CI_SERVER_URL}/api/v4/projects/${CI_PROJECT_ID}/packages/npm/"
    - export NPM_CONFIG_USERCONFIG="$CI_PROJECT_DIR/.npmrc.publish"
    - |
      if [[ -f .npmrc ]]; then
        mv .npmrc .npmrc.ci
        trap 'mv .npmrc.ci .npmrc' EXIT
      fi
    - |
      cat > "$NPM_CONFIG_USERCONFIG" <<EOF
      engine-strict=true
      registry=${NPM_REGISTRY}
      @${CI_PROJECT_ROOT_NAMESPACE}:registry=${NPM_REGISTRY}
      //${CI_SERVER_HOST}/api/v4/projects/${CI_PROJECT_ID}/packages/npm/:_authToken=${CI_JOB_TOKEN}
      always-auth=true
      EOF
    - NPM_PACKAGE_NAME=$(node -p "require('./package.json').name")
    - NPM_PACKAGE_VERSION=$(node -p "require('./package.json').version")
    - |
      if [[ ! $NPM_PACKAGE_NAME =~ ^@$CI_PROJECT_ROOT_NAMESPACE/ ]]; then
        echo "Invalid package scope! Packages must be scoped in the root namespace of the project, e.g. \"@${CI_PROJECT_ROOT_NAMESPACE}/${CI_PROJECT_NAME}\""
        exit 1
      fi
    - |
      existing_versions="$(npm view "${NPM_PACKAGE_NAME}" --registry "${NPM_REGISTRY}" versions --json 2>/dev/null || true)"
      if ! node -e 'const raw = process.argv[1] || "[]"; const current = process.argv[2]; let parsed; try { parsed = JSON.parse(raw); } catch { process.exit(2); } const versions = Array.isArray(parsed) ? parsed : [parsed]; process.exit(versions.includes(current) ? 0 : 1);' "$existing_versions" "$NPM_PACKAGE_VERSION"; then
        publish_dir="$(mktemp -d)"
        tar --exclude='.git' --exclude='.npmrc' --exclude='.npmrc.publish' --exclude='node_modules' -cf - . | tar -xf - -C "$publish_dir"
        cd "$publish_dir"
        npm publish --ignore-scripts --registry "${NPM_REGISTRY}"
      fi

mirror:github:
  stage: mirror
  needs:
    - publish
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'
  before_script: []
  script:
    # Configure this as a masked, protected GitLab CI/CD variable with write access to the GitHub mirror.
    - test -n "$GITHUB_MIRROR_TOKEN"
    - git config user.name "GitLab Mirror Bot"
    - git config user.email "mirror-bot@uhlhost.net"
    - git remote remove github 2>/dev/null || true
    - git remote add github "https://x-access-token:${GITHUB_MIRROR_TOKEN}@github.com/uhlhosting/medusa-notification-postal.git"
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        tag_target="$(git rev-parse "refs/tags/${CI_COMMIT_TAG}^{}")"
        if [ "$tag_target" != "$CI_COMMIT_SHA" ]; then
          echo "Refusing to mirror ${CI_COMMIT_TAG}: tag resolves to ${tag_target}, but pipeline verified ${CI_COMMIT_SHA}." >&2
          exit 1
        fi
        git push github "refs/tags/${CI_COMMIT_TAG}:refs/tags/${CI_COMMIT_TAG}"
      else
        git push github "HEAD:refs/heads/main"
      fi
