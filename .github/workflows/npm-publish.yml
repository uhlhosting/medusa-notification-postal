name: Publish npm package

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-production

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.5.3 --activate

      - name: Verify toolchain
        run: |
          node --version
          npm --version
          pnpm --version

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Pack dry run
        run: npm pack --dry-run

      - name: Publish
        run: npm publish --access public --provenance
