version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    ignore:
      # Medusa 2.16 admin extension build currently fails on esbuild 0.28.x.
      - dependency-name: "esbuild"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

